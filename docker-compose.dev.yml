services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: beacon
      POSTGRES_PASSWORD: beacon
      POSTGRES_DB: beacon
    ports:
      - "5544:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beacon -d beacon"]
      interval: 5s
      timeout: 3s
      retries: 12
    volumes:
      - beacon-pg:/var/lib/postgresql/data

  server:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://beacon:beacon@db:5432/beacon?sslmode=disable
      HTTP_ADDR: ":8080"
      ENV: dev
      RUN_SEED: "true"
      SEED_DATASET: dashboard
      CORS_ORIGINS: "http://localhost:3000"
    ports:
      - "8080:8080"
    profiles: ["full"] # `docker compose -f docker-compose.dev.yml up -d db` for local dev; add `--profile full` to run the server in a container too

volumes:
  beacon-pg:
