# Production compose for the stepanok.com server (Traefik + Let's Encrypt).
# Routed at https://beacon-api.stepanok.com. For LOCAL development use
# docker-compose.dev.yml (host ports, no Traefik): `make db` / `make run`.
#
# Secrets (POSTGRES_PASSWORD, the password in DATABASE_URL, JWT_SECRET) are NOT
# committed: they are interpolated from backend/.env (gitignored). Copy
# .env.example -> .env and fill in the real values on the deploy host.
services:
  db:
    image: postgis/postgis:16-3.4
    container_name: beacon-api-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: beacon
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: beacon
    # Enable TLS so the backend<->Postgres link is encrypted (the app uses sslmode=require).
    # A self-signed server cert is minted on each boot — require mode encrypts without
    # verifying identity, which is correct on the private 'internal' network the cert never
    # leaves. openssl ships in the postgis image. We override the entrypoint to mint the
    # cert, then hand off to the stock postgres entrypoint so initdb/startup are unchanged.
    entrypoint: ["bash", "-lc"]
    command:
      - >
        openssl req -new -x509 -days 3650 -nodes -subj '/CN=beacon-db'
        -out /var/lib/postgresql/server.crt -keyout /var/lib/postgresql/server.key &&
        chmod 600 /var/lib/postgresql/server.key &&
        chown postgres:postgres /var/lib/postgresql/server.crt /var/lib/postgresql/server.key &&
        exec docker-entrypoint.sh postgres -c ssl=on
        -c ssl_cert_file=/var/lib/postgresql/server.crt
        -c ssl_key_file=/var/lib/postgresql/server.key
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beacon -d beacon"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - beacon-pg:/var/lib/postgresql/data
    networks:
      - internal

  app:
    build: .
    container_name: beacon-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # DB transit is TLS-encrypted (the db service runs ssl=on). sslmode=require ENFORCES
      # TLS — the backend refuses a silent plaintext fallback. ENV=prod additionally fails
      # closed if this is ever weakened to disable/prefer (see internal/config.sslEnforced).
      DATABASE_URL: "postgres://beacon:${POSTGRES_PASSWORD}@db:5432/beacon?sslmode=require"
      HTTP_ADDR: ":8080"
      ENV: prod
      RUN_SEED: "false"
      SEED_DATASET: both
      JWT_SECRET: "${JWT_SECRET}"
      CORS_ORIGINS: "https://beacon.stepanok.com,https://beacon-help.stepanok.com"
      LOG_LEVEL: info
      PGX_MAX_CONNS: "10"
      PHOTO_DIR: /data/photos
      # AES-256 key (base64/hex, 32 bytes) for at-rest encryption of photos + MFA secrets.
      # Required in prod — the backend refuses to boot without it (config fail-closed).
      DATA_ENCRYPTION_KEY: "${DATA_ENCRYPTION_KEY}"
      TRANSLATE_URL: "http://beacon-libretranslate:5000"
      TRANSLATE_TARGET: "en"
    volumes:
      - beacon-photos:/data/photos
    networks:
      - web
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.beacon-api.rule=Host(`beacon-api.stepanok.com`)"
      - "traefik.http.routers.beacon-api.entrypoints=websecure"
      - "traefik.http.routers.beacon-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.beacon-api.loadbalancer.server.port=8080"

networks:
  web:
    external: true
  internal:
    driver: bridge

volumes:
  beacon-pg:
  beacon-photos:
